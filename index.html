<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شعار أثر المطور - مفرغ ومتجاوب</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية محايدة لتوضيح التفاصيل، الشعار نفسه مفرغ بالكامل */
            background: #0d1117; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo-container {
            width: 85%;
            max-width: 500px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            /* ظل ديناميكي يبرز الشعار على أي خلفية */
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
        }

        .controls {
            margin: 40px 0;
            text-align: center;
        }

        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #F2DFAB, #C8A96A);
            color: #080808;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 20px rgba(200, 169, 106, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #F9E7B9, #D9B776);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(200, 169, 106, 0.5);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- viewBox مربع متناسب مع جميع المنصات ومفرغ بالكامل -->
        <svg id="athar-responsive-logo" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#F9E7B9"/>
                    <stop offset="35%" stop-color="#D4B26F"/>
                    <stop offset="70%" stop-color="#A67C29"/>
                    <stop offset="100%" stop-color="#5E430C"/>
                </linearGradient>

                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.8"/>
                </filter>
            </defs>

            <!-- حرف الألف والهمزة في المنتصف -->
            <g filter="url(#glow)">
                <rect x="355" y="160" width="90" height="380" rx="16" fill="url(#goldGradient)"/>
                <path d="M 310 100 L 490 100 L 490 140 L 310 140 Z" fill="url(#goldGradient)"/>
            </g>

            <!-- الموجات الصوتية الكوفية الجانبية بتناسق تام -->
            <g filter="url(#glow)">
                <polyline points="200,440 260,440 290,380 320,500 350,440 380,440" fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="square"/>
                <polyline points="420,440 450,440 480,380 510,500 540,440 600,440" fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linecap="square"/>
            </g>

            <!-- النصوص -->
            <text x="400" y="640" text-anchor="middle" font-size="95" font-family="'Courier New', Courier, monospace" font-weight="bold" fill="url(#goldGradient)" filter="url(#glow)">أثر</text>
            <text x="400" y="705" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" font-weight="normal" letter-spacing="20" fill="url(#goldGradient)" opacity="0.95">ATHAR</text>
        </svg>
    </div>

    <div class="controls">
        <button onclick="downloadSVG()">تحميل الشعار مفرغ (SVG)</button>
    </div>

    <script>
        function downloadSVG() {
            const svgElement = document.getElementById("athar-responsive-logo").outerHTML;
            const svgBlob = new Blob([svgElement], {type:"image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(svgBlob);
            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = "athar_transparent_responsive.svg";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
